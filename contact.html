<!DOCTYPE html>

<html>
<head>
    <link rel="icon" type="image/x-icon" href="images/favicon.ico">
    <title>big mark - Contact</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script type="text/javascript">
        (function () {
            // https://dashboard.emailjs.com/admin/account
            emailjs.init({
                publicKey: "bs4ku3ifyZg2UNpvV",
            });
        })();
    </script>
    <script src="https://code.jquery.com/jquery-4.0.0.min.js" type="text/javascript"></script>
    <script src="scripts/main.js"></script>
    <script type="text/javascript">
        removeHtml();

        window.onload = function () {
            document.getElementById('contact-form').addEventListener('submit', function (event) {

                document.getElementById('time').value = getTimeAndDate(new Date().toISOString());

                let message = document.getElementById("message");
                message.className = "errorMessage";

                event.preventDefault();
                // these IDs from the previous steps
                emailjs.sendForm('service_hl82gxq', 'template_9przrd6', this)
                    .then(() => {
                        console.log('SUCCESS!');
                        message.textContent = "Message successfully went through. Thank you for contacting me!";
                    }, (error) => {
                        console.log('FAILED...', error);
                        message.textContent = error;
                    });
            });
        }
    </script>
    <link rel="stylesheet" href="styles.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>
    <header>
        <br />
        <a href="index.html"><h1 class="title" style="display:inline;">big mark</h1></a>
        <br />
        <br />
        <div id="navbar">
            <button id="btn_blog" onclick="goToSection(0);">Blog</button>
            <button id="btn_projects" onclick="goToSection(1);">Projects</button>
            <button id="btn_contact" onclick="goToSection(2);">Contact</button>
            <button id="btn_about" onclick="goToSection(3);">About</button>
        </div>
        <br />
    </header>
    <hr />
    <br />
    <article id="articleContainer" class="articleContainer" , style="display:grid">

        <p id="message" style="place-self:center">Status output will go here.</p>
        <form id="contact-form" , style="display:grid">

            <input id="time" type="hidden" name="time" value="value">

            <table class="contactTable">
                <tr>
                    <td>Name</td>
                    <td><input id="contactName" class="contactInput" maxlength=64 type="text" name="name" required /></td>
                </tr>
                <tr>
                    <td>Email</td>
                    <td><input id="contactEmail" class="contactInput" maxlength=64 type="email" name="email" required /></td>
                </tr>
                <tr>
                    <td>Subject</td>
                    <td><input id="contactTitle" class="contactInput" maxlength=64 type="text" name="title" required /></td>
                </tr>
                <tr>
                    <td>Message</td>
                    <td><textarea id="contactMessage" class="contactMessage" maxlength=1024 name="message" required></textarea></td>
                </tr>
            </table>
            <br />
            <button name="submit" style="place-self:center" onclick="submitMessage();">submit</button>
        </form>
    </article>
</body>
</html>
