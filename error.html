            <button id="btn_blog" onclick="goToSection(0);">Blog</button>

        </div>

    <hr />
    <br />
    <section id="errorSection">
        <script id="errorMessageGenerator">
            function produceErrorMessage() {
                if (document.getElementById("error") != null)
                    return;

                const errorSection = document.getElementById("errorSection");
                var errorMessage = document.createElement("h1");
                errorMessage.id = "error";

                if (!getParameters().has("type") || getParameters().get("type") == "") {
                    errorMessage.textContent = "i don't know how you got here.";
                }
                else {
                    errorMessage.textContent = getParameters().get("type");
                }

                errorSection.insertAdjacentElement("beforeend", errorMessage);
                document.removeChild(document.getElementById("errorMessageGenerator"));
            }

            produceErrorMessage();
        </script>
    </section>
</body>
</html>
